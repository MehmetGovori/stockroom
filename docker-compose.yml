services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: stockroom
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: stockroom
      DB_USERNAME: root
      DB_PASSWORD: ""
      API_KEY: "local-development-key"
      CORS_ALLOWED_ORIGINS: "http://localhost:8081,http://localhost:5173"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:8000/api"
        VITE_API_KEY: "local-development-key"
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  dbdata:
